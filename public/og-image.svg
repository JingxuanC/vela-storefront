<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08090a"/>
      <stop offset="100%" style="stop-color:#0f1011"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d48018"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="157" x2="1200" y2="157" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="472" x2="1200" y2="472" stroke="#fff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="180" fill="none" stroke="rgba(212,128,24,0.06)" stroke-width="1"/>
  <circle cx="1050" cy="100" r="120" fill="none" stroke="rgba(212,128,24,0.08)" stroke-width="1"/>
  <circle cx="1050" cy="100" r="60" fill="none" stroke="rgba(212,128,24,0.12)" stroke-width="1"/>
  <circle cx="1050" cy="100" r="8" fill="#d48018" opacity="0.6"/>

  <!-- Nodes at circle positions -->
  <circle cx="1050" cy="40" r="5" fill="#d48018" opacity="0.4"/>
  <circle cx="1110" cy="100" r="5" fill="#d48018" opacity="0.5"/>
  <circle cx="1050" cy="160" r="5" fill="#d48018" opacity="0.4"/>
  <circle cx="990" cy="100" r="5" fill="#d48018" opacity="0.5"/>

  <!-- Left decorative dots -->
  <circle cx="80" cy="550" r="2" fill="#f5a623" opacity="0.3"/>
  <circle cx="140" cy="570" r="1.5" fill="#d48018" opacity="0.2"/>
  <circle cx="200" cy="540" r="2.5" fill="#f5a623" opacity="0.25"/>

  <!-- Logo -->
  <rect x="70" y="60" width="64" height="64" rx="16" fill="url(#accent)"/>
  <text x="102" y="107" text-anchor="middle" fill="#fff" font-size="46" font-weight="700" font-family="Inter, system-ui, sans-serif">✦</text>
  <text x="150" y="105" fill="#f7f8f8" font-size="36" font-weight="700" font-family="Inter, system-ui, sans-serif">Vela AI</text>

  <!-- Tagline -->
  <text x="70" y="230" fill="#f7f8f8" font-size="48" font-weight="700" font-family="Inter, system-ui, sans-serif" letter-spacing="-1">
    AI-Powered Growth
  </text>
  <text x="70" y="280" fill="#f7f8f8" font-size="48" font-weight="700" font-family="Inter, system-ui, sans-serif" letter-spacing="-1">
    for <tspan fill="#f5a623">Shopify</tspan> Stores
  </text>

  <!-- Subtitle -->
  <text x="70" y="350" fill="#a0a4ab" font-size="22" font-family="Inter, system-ui, sans-serif">
    One install — customer support, marketing, SEO, content. 24/7.
  </text>

  <!-- Feature pills -->
  <rect x="70" y="400" width="200" height="44" rx="22" fill="rgba(212,128,24,0.1)" stroke="rgba(212,128,24,0.2)" stroke-width="1"/>
  <text x="170" y="428" text-anchor="middle" fill="#f5a623" font-size="16" font-weight="600" font-family="Inter, system-ui, sans-serif">🤖 AI Sales Agent</text>

  <rect x="285" y="400" width="200" height="44" rx="22" fill="rgba(212,128,24,0.1)" stroke="rgba(212,128,24,0.2)" stroke-width="1"/>
  <text x="385" y="428" text-anchor="middle" fill="#f5a623" font-size="16" font-weight="600" font-family="Inter, system-ui, sans-serif">📊 Analytics</text>

  <rect x="500" y="400" width="200" height="44" rx="22" fill="rgba(212,128,24,0.1)" stroke="rgba(212,128,24,0.2)" stroke-width="1"/>
  <text x="600" y="428" text-anchor="middle" fill="#f5a623" font-size="16" font-weight="600" font-family="Inter, system-ui, sans-serif">🛒 Cart Recovery</text>

  <!-- Bottom tagline -->
  <text x="70" y="530" fill="#6b6f76" font-size="18" font-family="Inter, system-ui, sans-serif">
    Replace 5+ apps. Save $204/month. Grow faster.
  </text>

  <!-- URL -->
  <text x="70" y="575" fill="#6b6f76" font-size="16" font-family="Inter, system-ui, sans-serif">
    velagrow.com
  </text>
</svg>
